id: email_calendar_route_v1
name: Email and Calendar Assistant
status: published
summary: A golden-path route for reading email, previewing a reply for approval, and then — only after approval — writing the calendar event and saving the reply as a mailbox draft. Optionally sends, but only behind its own second approval.
components:
  - email_read
  - intent_classifier
  - email_draft
  - optional_email_send
  - calendar_lookup
  - calendar_write
  - gmail_draft_write
  - human_approval_gate
  - audit_log
edges:
  - email_read__produces__intent_classifier
  - email_draft__safer_with__human_approval_gate
  - email_draft__produces__gmail_draft_write
  - optional_email_send__requires__human_approval_gate
  - calendar_write__requires__human_approval_gate
  - gmail_draft_write__requires__human_approval_gate
  - gmail_draft_write__can_run_parallel__calendar_write
  - audit_log__recommended__optional_email_send
  - audit_log__recommended__calendar_write
  - audit_log__recommended__gmail_draft_write
  - email_draft__compatible__calendar_lookup
risk_level: high
confidence: 0.88
failure_modes:
  - Email sent to wrong recipient due to autocomplete in approval UI
  - Calendar event created in wrong timezone
  - OAuth token expiry causes silent read or write failure
  - Approval notification not delivered, workflow stalls indefinitely
  - Intent misclassification routes a scheduling email to the reply flow
  - Retry after a timed-out draft save leaves two near-identical drafts in the mailbox
  - A saved draft is mistaken for a sent reply, so the user believes the message went out
evals:
  - intent classification accuracy on email type test set
  - draft quality score on diverse email scenarios
  - approval gate latency on test approval flows
  - calendar timezone correctness on locale-diverse test cases
  - duplicate send prevention test
  - draft-save idempotency test — a retry does not create a second draft
  - scope test — a draft-only build requests gmail.compose and never gmail.send
notes: >
  Treat every external send (email or calendar invite) as irreversible. The approval gate
  must show the full draft and recipient list — not a summary. A user who approves without
  reading the full draft has not meaningfully approved it.

  email_draft and gmail_draft_write are two different steps, and the gate sits between them.
  email_draft COMPOSES the reply and writes nothing — it is the preview the user approves.
  gmail_draft_write SAVES that approved text into the mailbox. Collapsing them loses the
  only point at which the user can still change their mind, because the text would already
  be in the Drafts folder by the time they see it.

  A draft-only build never needs gmail.send. If a build asks for it, the send capability is
  arriving through some other step — find it before granting the scope.
