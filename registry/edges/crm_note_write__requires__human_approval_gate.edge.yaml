id: crm_note_write__requires__human_approval_gate
from: crm_note_write
to: human_approval_gate
relation: requires
status: published
reason: Writing to a CRM record is externally visible and effectively irreversible without platform-level rollback. Autonomous CRM writes risk polluting lead data with incorrect notes or activity records.
severity: critical
notes: Approval UI must show the full note content, the resolved contact identifier, and the source context the agent used to generate the note. Approval without full context is not approval.
conditions: []
tested: false
test_refs: []
failure_modes:
  - CRM record updated with hallucinated content when LLM output is not reviewed
  - wrong contact record mutated when identifier resolution was ambiguous
sources: []
