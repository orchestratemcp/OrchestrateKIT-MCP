id: intent_classifier__produces__crm_note_write
from: intent_classifier
to: crm_note_write
relation: produces_input_for
status: published
reason: When intent classification identifies a sales lead or partnership opportunity, the structured classification output (contact identity, lead category, context) is the input needed to write a CRM note.
