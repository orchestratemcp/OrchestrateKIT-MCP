id: data_scraper__safer_with__auth_failure_handler
from: data_scraper
to: auth_failure_handler
relation: safer_with
status: published
reason: Scrapers and API pulls authenticate with keys or session tokens that expire or hit rate-scope limits. A credential-failure path lets a long-running extraction refresh and resume instead of aborting the whole run.
severity: high
notes: Distinguish auth failure (401/403) from rate limiting (429) — the latter is retry_policy's job, the former is auth_failure_handler's.
conditions: []
tested: true
test_refs:
