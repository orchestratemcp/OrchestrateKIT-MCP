capabilities:
  - accept_user_input
  - structure_goal
  - extract_intent_hints
inputs:
  - free-text goal or structured request from the user
outputs:
  - structured goal object with extracted intent hints and constraints
risk_level: low
side_effects: []
permissions:
  read: []
  write: []
  approval_required_for: []
requires: []
recommended_with:
