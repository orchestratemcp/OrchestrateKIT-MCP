  - state_store
avoid_with: []
failure_modes:
  - ambiguous goal causes downstream components to act on wrong intent
  - missing constraints lead to over-broad retrieval or generation
evals:
  - goal parsing accuracy on diverse test inputs
  - constraint extraction recall
tested_in_playbooks:
  - research_agent_citations
  - codebase_agent_workflow
tested_in_routes:
  - research_route_v1
  - codebase_agent_route_v1
sources: []
