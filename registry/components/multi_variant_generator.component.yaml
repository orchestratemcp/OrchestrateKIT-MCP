id: multi_variant_generator
name: Multi-Variant Generator
status: published
category: output
summary: Generates multiple distinct variants of a content piece (copy, subject line, CTA, headline, image brief) for A/B or multivariate testing. Each variant is labelled with a hypothesis tag so downstream analytics can correlate performance with the generative intent.
capabilities:
  - multi_variant_content_generation
  - hypothesis_tagging
  - variant_labelling
  - tone_and_style_diversification
  - deterministic_variant_count
inputs:
  - base brief or seed content, desired variant count (2-10), tone axes to vary (formal/casual, long/short, etc.)
outputs:
  - "array of labelled variant objects: {variant_id, hypothesis, content, metadata}"
risk_level: low
side_effects:
  - none — outputs variants in memory; downstream step decides which to publish
permissions:
  read:
    - source brief and brand guidelines
  write: []
  approval_required_for:
    - any downstream publish action using a variant
requires: []
recommended_with:
  - human_approval_gate
  - copy_generation
  - external_publish
avoid_with: []
failure_modes:
  - variants are too similar to provide meaningful test signal
  - variant count requested exceeds token budget (truncated output)
  - hypothesis tags are vague and prevent meaningful analytics correlation
evals:
  - semantic diversity score across variants (target > 0.3 cosine distance)
  - all requested variants returned (no silent truncation)
  - every variant carries a non-empty hypothesis tag
tested_in_playbooks: []
tested_in_routes: []
sources: []

model_tier: small
fallback_tier: none
context_need: moderate
compression_strategy: truncate
