id: copy_generation
name: Copy Generation
status: published
category: processing
summary: Generates marketing or editorial copy from a structured content brief using an LLM.
capabilities:
  - generate_copy
  - apply_brand_voice
  - produce_variants
inputs:
  - structured content request (audience, tone, format, key messages)
outputs:
  - one or more copy variants with metadata
risk_level: medium
side_effects:
  - LLM API call (token cost)
permissions:
  read: []
  write: []
  approval_required_for:
    - external_publish
requires:
  - content_idea_intake
recommended_with:
  - human_approval_gate
  - design_brief_generation
avoid_with: []
failure_modes:
  - LLM ignores brand voice guidelines
  - generated copy contains legally risky claims
  - variants are too similar, providing no useful choice
evals:
  - brand voice adherence score (human or automated)
  - legal risk flag rate on known sensitive topics
  - variant diversity metric
tested_in_playbooks:
  - content_approval_pipeline
tested_in_routes:
  - content_approval_route_v1
sources: []

model_tier: standard
fallback_tier: small
context_need: moderate
compression_strategy: summarise
