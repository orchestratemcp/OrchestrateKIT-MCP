id: reviewer_notification
name: Reviewer Notification
status: published
category: output
summary: Sends a targeted notification to a specific human reviewer or approver, signalling that content, code, or a workflow artifact is ready for their review — distinct from external_publish (which publishes to an audience) and slack_notification (which broadcasts to a channel).
capabilities:
  - reviewer_alert
  - review_request
  - approval_request
  - stakeholder_notification
inputs:
  - reviewer identity (name, email, or system user ID), artifact reference (URL, title, or content summary), review instructions or checklist
outputs:
  - notification delivery confirmation, review_request_id for status polling
risk_level: medium
side_effects:
  - sends a notification to the named reviewer via email, internal tool, or API
permissions:
  read:
    - artifact to be reviewed
  write:
    - notification channel (email, Jira, GitHub review request, etc.)
  approval_required_for:
    - sending a review request that blocks a downstream publish or release
requires: []
recommended_with:
  - human_approval_gate
  - review_draft_composer
  - audit_log
avoid_with: []
failure_modes:
  - reviewer not reachable (invalid email, deactivated account) causes notification to silently drop
  - notification loops if re-triggered before the reviewer responds
  - reviewer receives notification without the full artifact context, leading to an incomplete review
  - no timeout or escalation path means the workflow stalls indefinitely awaiting review
evals:
  - delivery confirmation rate on a test reviewer set
  - reviewer response time tracking (proxy for notification clarity)
  - escalation trigger test — verify a second notification fires if no response within SLA
tested_in_playbooks: []
tested_in_routes: []
sources: []

model_tier: none
fallback_tier: none
context_need: minimal
compression_strategy: none
