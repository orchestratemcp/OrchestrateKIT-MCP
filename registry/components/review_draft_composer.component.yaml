id: review_draft_composer
name: Review Draft Composer
status: published
category: output
summary: Composes a structured draft (document, report, summary, proposal, or content piece) and stages it for human review before finalisation. Separates the generation step from the approval step — the draft is never published without an explicit review signal.
capabilities:
  - draft_generation
  - structured_content_assembly
  - review_staging
  - revision_history_tracking
  - template_based_composition
inputs:
  - content brief or source material, target format or template, audience context
outputs:
  - staged draft object with version, content body, review_status=pending, and suggested edits
risk_level: low
side_effects:
  - writes draft to staging store (not to any external publishing channel)
permissions:
  read:
    - source material and brief
  write:
    - draft staging store
  approval_required_for:
    - any downstream publish or send action
requires: []
recommended_with:
  - human_approval_gate
  - copy_generation
  - audit_log
avoid_with: []
failure_modes:
  - generated draft omits critical sections from the brief
  - template substitution leaves unfilled placeholders in output
  - draft gets published without triggering the review gate
evals:
  - section coverage — all brief sections present in output (target > 95%)
  - unfilled placeholder rate (target 0%)
  - review_status correctly set to pending on every output
tested_in_playbooks: []
tested_in_routes: []
sources: []

model_tier: small
fallback_tier: none
context_need: moderate
compression_strategy: summarise
