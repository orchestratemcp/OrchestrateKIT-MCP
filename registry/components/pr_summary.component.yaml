id: pr_summary
name: PR Summary
status: published
category: output
summary: Generates a structured pull request description from the changes made and the plan context.
capabilities:
  - generate_pr_description
  - summarise_diff
  - include_test_results
inputs:
  - git diff, plan steps, test results
outputs:
  - PR title, description, checklist, test evidence
risk_level: low
side_effects: []
permissions:
  read:
    - git diff
  write: []
  approval_required_for: []
requires:
  - code_editing
  - test_runner
recommended_with:
  - human_approval_gate
avoid_with: []
failure_modes:
  - summary omits important context about why a change was made
  - summary includes implementation details that belong in commit messages, not PR body
evals:
  - human preference score vs baseline on known PR test cases
  - completeness check — all changed files mentioned
tested_in_playbooks:
  - codebase_agent_workflow
tested_in_routes:
  - codebase_agent_route_v1
sources: []

model_tier: standard
fallback_tier: small
context_need: moderate
compression_strategy: summarise
