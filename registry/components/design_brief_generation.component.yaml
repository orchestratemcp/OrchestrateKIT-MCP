id: design_brief_generation
name: Design Brief Generation
status: published
category: processing
summary: Generates a structured design brief from approved copy to guide visual production.
capabilities:
  - generate_design_brief
  - extract_visual_requirements
  - suggest_layout_and_assets
inputs:
  - approved copy variant, brand guidelines
outputs:
  - structured design brief (layout, imagery, colour, typography, dimensions)
risk_level: low
side_effects:
  - LLM API call (token cost)
permissions:
  read: []
  write: []
  approval_required_for: []
requires:
  - copy_generation
recommended_with:
  - human_approval_gate
avoid_with: []
failure_modes:
  - design brief conflicts with approved copy content
  - missing brand guideline context produces off-brand visual directions
evals:
  - brief completeness score (all required fields populated)
  - brand guideline adherence on test cases
tested_in_playbooks:
  - content_approval_pipeline
tested_in_routes:
  - content_approval_route_v1
sources: []

model_tier: standard
fallback_tier: small
context_need: moderate
compression_strategy: summarise
