id: email_calendar_assistant
version: "1.0.0"
title: Email and Calendar Assistant
status: published
summary: >
  Opinionated blueprint for an AI assistant that reads email, classifies intent,
  drafts replies and optionally sends or schedules — with human approval on every
  external action. Optimised for safety over convenience.
workflow_type: email-calendar
risk_level: high
golden_path_route_id: email_calendar_route_v1
components:
  - email_read
  - intent_classifier
  - email_draft
  - optional_email_send
  - calendar_lookup
  - calendar_write
  - human_approval_gate
  - audit_log
edges:
  - email_read__produces__intent_classifier
  - email_draft__safer_with__human_approval_gate
  - optional_email_send__requires__human_approval_gate
  - calendar_write__requires__human_approval_gate
  - audit_log__recommended__optional_email_send
  - audit_log__recommended__calendar_write
  - email_draft__compatible__calendar_lookup
stack_id: default_orchestratekit_stack
best_for:
  - scheduling assistant that reads meeting requests and drafts replies with slot suggestions
  - inbox triage that classifies emails and drafts responses for human approval
  - calendar management agent that suggests and creates events from email context
avoid_when:
  - fully autonomous email sending without human review
  - bulk email outreach or marketing sends
  - external-facing customer support without human escalation path
recommended_architecture:
  pattern: Read → classify → draft → approve → act pipeline with separate approval checkpoints per external action
  why: >
    Every external write (send, calendar create) requires its own explicit approval.
    Combining email send and calendar write into one approval step reduces clarity
    and increases the chance of accidental approval. Keep them as separate checkpoints.
llm_driven_steps:
  - intent_classifier
  - email_draft
deterministic_steps:
  - email_read
  - optional_email_send
  - calendar_lookup
  - calendar_write
  - audit_log
guardrails:
  - Never send email or create calendar events without explicit human approval
  - Approval UI must show the full draft and recipient list — not a summary
  - Do not combine email send and calendar write into a single approval step
  - Treat every external action as irreversible — there is no reliable undo
  - Do not build bulk email send flow with this playbook — it is for individual interactions only
failure_modes:
  - Intent misclassification routes a scheduling email to reply flow, missing the calendar step
  - OAuth token expiry causes silent email read failure, returning empty inbox
  - Draft sent to wrong recipient due to autocomplete error in approval UI
  - Calendar event created in wrong timezone when source email does not specify timezone explicitly
  - Approval notification not delivered, workflow stalls indefinitely without timeout handling
  - Duplicate send on retry after transient failure if send is not idempotent
evals:
  - intent classification accuracy on 20-email labelled test set
  - draft quality score (human annotation) on 10 diverse email scenarios
  - timezone correctness on locale-diverse scheduling test cases
  - approval gate enforcement test — send blocked when approval is absent
  - duplicate send prevention test on simulated transient failure
  - audit log completeness — every send and calendar_write has a record
implementation_steps:
  - "Step 1: Implement email_read with IMAP or provider API. Strip quoted reply chains before passing to intent_classifier"
  - "Step 2: Implement intent_classifier to distinguish: reply-only, schedule-meeting, decline-meeting, archive/no-action"
  - "Step 3: For schedule-meeting intent, run calendar_lookup to find free slots before drafting"
  - "Step 4: Implement email_draft prompt with tone instructions and any relevant context (meeting slots, previous messages)"
  - "Step 5: Surface draft to human_approval_gate — show full draft, recipient list and thread context"
  - "Step 6: On draft approval, offer optional_email_send. Require a second explicit approval for the actual send"
  - "Step 7: For calendar events, show full event details (attendees, time, timezone) in approval UI before calendar_write"
  - "Step 8: Write audit_log entry after every send or calendar_write with actor, timestamp and action payload"
sources:
  - title: Google Calendar API documentation
    url: https://developers.google.com/calendar/api/guides/overview
    source_type: official_docs
    last_checked: "2026-06-01"
  - title: Gmail API documentation
    url: https://developers.google.com/gmail/api/guides
    source_type: official_docs
    last_checked: "2026-06-01"
