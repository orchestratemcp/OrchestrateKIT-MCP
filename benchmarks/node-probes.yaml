# OrchestrateKit MCP — Node probes (MAR-125 / TEST-01)
#
# Deterministic, single-capability assertions run through the FULL composeRoute
# (matcher + safety augmenter + ordering). No LLM, no human. These are FIXTURES
# that pin matcher/composer behaviour at the unit level — NOT logged sessions.
#
# Per probe:
#   goal       — a single-capability goal in plain language
#   must_have  — component ids that MUST appear in the composed route
#   forbidden  — component ids that MUST NOT appear (guards cross-domain bleed)
#   xfail      — (optional) known-failing probe documenting an open bug. Does not
#                fail the gate; if it starts PASSING the runner errors so the
#                marker (and the bug) can be closed out. `finding` = Linear id.
#
# Run:  pnpm probe            (exit 1 on any miss/leak)
# CI:   tests/graph/nodeProbes.test.ts runs the same probes under vitest.

probes:
  # ── email / calendar domain ──────────────────────────────────────────────
  - id: email_draft_basic
    goal: "Draft a reply email to a customer enquiry."
    must_have: [email_draft]
    forbidden: [design_brief_generation, research_synthesis, external_publish]

  - id: email_read_triage
    goal: "Read and triage my incoming emails."
    must_have: [email_read]
    forbidden: [design_brief_generation, external_publish]

  - id: calendar_lookup_availability
    goal: "Look up my calendar availability for next week."
    must_have: [calendar_lookup]
    forbidden: [external_publish, research_synthesis, design_brief_generation]

  # ── research domain ──────────────────────────────────────────────────────
  - id: research_synthesis_with_citations
    goal: "Synthesize a grounded summary from multiple research sources with inline citations."
    must_have: [research_synthesis, citation_checker]
    forbidden: [external_publish, design_brief_generation, crm_note_write]

  - id: source_retrieval_only
    goal: "Retrieve documents from multiple origins for a research task."
    must_have: [source_retrieval]
    forbidden: [external_publish, design_brief_generation]

  # ── content / publishing domain ──────────────────────────────────────────
  - id: design_brief_generation
    goal: "Generate a creative design brief for a marketing campaign."
    must_have: [design_brief_generation]
    forbidden: [research_synthesis, external_publish, crm_note_write]

  - id: external_publish_safety_chain
    goal: "Publish approved marketing content to our social channels, with an audit trail, only after I approve it."
    must_have: [external_publish, human_approval_gate, audit_log]
    forbidden: [crm_note_write]

  # ── data / ETL domain ────────────────────────────────────────────────────
  - id: etl_scrape_normalize_validate
    goal: "Build a pipeline that scrapes data, normalizes it, and validates the schema."
    must_have: [data_scraper, data_normalizer, schema_validation]
    forbidden: [external_publish, research_synthesis, design_brief_generation]

  - id: deduplication_only
    goal: "Deduplicate records in a dataset."
    must_have: [deduplication]
    forbidden: [external_publish, design_brief_generation, research_synthesis]

  # ── code-agent domain ────────────────────────────────────────────────────
  - id: code_edit_and_test
    goal: "An agent that edits code in my repository and runs the test suite."
    must_have: [code_editing, test_runner]
    forbidden: [research_synthesis, external_publish, design_brief_generation]

  - id: codebase_scan_only
    goal: "Scan the codebase and summarize its structure."
    must_have: [codebase_scan]
    forbidden: [external_publish, research_synthesis, design_brief_generation]

  - id: pr_summary_only
    goal: "Summarize a pull request for reviewers."
    must_have: [pr_summary]
    forbidden: [research_synthesis, external_publish, design_brief_generation]

  # ── crm / sales domain ───────────────────────────────────────────────────
  - id: crm_note_after_call
    goal: "Write a note to our CRM after a sales call."
    must_have: [crm_note_write]
    forbidden: [external_publish, design_brief_generation, research_synthesis]

  # ── monitoring domain ────────────────────────────────────────────────────
  - id: page_monitor_alert
    goal: "Monitor a web page for changes and alert me when it changes."
    must_have: [page_monitor]
    forbidden: [external_publish, design_brief_generation, research_synthesis]

  # ── generic orchestration ────────────────────────────────────────────────
  - id: intent_classifier_only
    goal: "Classify the intent of an incoming support message."
    must_have: [intent_classifier]
    forbidden: [external_publish, design_brief_generation, research_synthesis]

  # ── MAR-131: "schedule"/"hourly" must not inject calendar_* ───────────────
  # Weak timing tokens are infra signals, not calendar signals. A monitoring or
  # content goal with no email/calendar intent must not pull calendar components.
  - id: hourly_monitor_no_calendar
    goal: "Monitor a competitor's pricing page on an hourly schedule and alert me when the price changes."
    must_have: [page_monitor]
    forbidden: [calendar_lookup, calendar_write]

  - id: social_schedule_no_calendar
    goal: "Repurpose a blog post into social posts and schedule them across channels."
    must_have: [external_publish]
    forbidden: [calendar_lookup, calendar_write]

  # ── MAR-130: email_calendar_assistant must not over-match other domains ────
  # Run through plan_workflow (the playbook-routing path). A generic
  # trigger+approval+write shape must NOT be led by email_calendar_assistant when
  # the goal's primary domain is CRM / invoice / HR.
  - id: crm_lead_not_email_calendar
    goal: "When a new lead comes in, log a note to our CRM and draft a follow-up email for approval."
    via: plan
    must_have: [crm_note_write]
    forbidden: []
    forbidden_playbook: [email_calendar_assistant]

  - id: invoice_reminder_not_email_calendar
    goal: "Read incoming invoice emails, extract the totals, and send a reminder email when one is overdue."
    via: plan
    must_have: [email_read]
    forbidden: []
    forbidden_playbook: [email_calendar_assistant]

  - id: hr_onboarding_not_email_calendar
    goal: "Onboard a new hire: schedule their intro meetings and send a welcome email."
    via: plan
    must_have: [email_draft]
    forbidden: []
    forbidden_playbook: [email_calendar_assistant]

  # ── MAR-132: "no human in the loop" with Slack output → advisory gate ──────
  # The word "human" in an explicit opt-out used to fuzzy-match the gate into
  # a read-only monitor route. Safety gates come from the augmenter (real
  # external writes), never fuzzy token matching. "Slack" IS a real write so
  # slack_notification must appear and the gate becomes advisory (not required).
  - id: unattended_monitor_no_gate
    goal: "Monitor a competitor's pricing page on an hourly schedule and alert me on Slack when it changes. Runs unattended, no human in the loop."
    must_have: [page_monitor, slack_notification]
    forbidden: [calendar_lookup, calendar_write]

  # ── T2 content gaps: trigger components ─────────────────────────────────────
  - id: scheduled_trigger_nightly_etl
    goal: "Run a nightly data extraction job that scrapes the product catalogue and loads it into the warehouse."
    via: plan
    must_have: [scheduled_trigger, data_scraper]
    forbidden: [calendar_lookup, calendar_write, email_draft]

  - id: webhook_trigger_stripe_payment
    goal: "React to Stripe payment events via webhook: validate the payload, update CRM, and notify the sales team on Slack."
    via: plan
    must_have: [webhook_trigger, schema_validation]
    forbidden: [calendar_lookup, calendar_write]

  - id: review_draft_composer_content
    goal: "Draft a weekly market update report from research sources and stage it for editorial review before publishing."
    via: plan
    must_have: [review_draft_composer]
    forbidden: [calendar_lookup, calendar_write]

  - id: multi_variant_generator_ab
    goal: "Generate five A/B test variants of the product launch email subject line and body for the campaign."
    via: plan
    must_have: [multi_variant_generator]
    forbidden: [calendar_lookup, calendar_write]

  # ── T3 integration components ────────────────────────────────────────────────
  - id: pdf_extraction_invoice
    goal: "Extract line items and totals from uploaded PDF invoices and load the structured data into the accounting system."
    via: plan
    must_have: [pdf_extraction, data_normalizer]
    forbidden: [calendar_lookup, calendar_write, email_draft]

  - id: airtable_lookup_crm
    goal: "Look up customer records from the Airtable CRM base, normalise the fields, and generate a weekly summary report."
    via: plan
    must_have: [airtable_lookup]
    forbidden: [calendar_lookup, calendar_write]

  - id: stripe_data_read_churn
    goal: "Read subscription data from Stripe, identify customers who cancelled in the last 30 days, and produce a churn analysis report."
    via: plan
    must_have: [stripe_data_read, data_normalizer]
    forbidden: [calendar_lookup, calendar_write]

  # ── T4 control-flow + trigger components ────────────────────────────────────
  - id: github_trigger_pr_review
    goal: "Trigger a code review workflow when a pull request is opened on GitHub — validate the payload, run tests, and notify the reviewer."
    via: plan
    must_have: [github_trigger, schema_validation]
    forbidden: [calendar_lookup, calendar_write]

  - id: loop_controller_batch
    goal: "Process each item in a backlog list by iterating through them one at a time and generating a summary for each."
    via: plan
    must_have: [loop_controller]
    forbidden: [calendar_lookup, calendar_write]

  - id: reviewer_notification_draft
    goal: "Generate a draft article from the content brief and send a review request to the editorial team before publishing."
    via: plan
    must_have: [reviewer_notification]
    forbidden: [calendar_lookup, calendar_write]

  # ── MAR-134: saga_compensation + threshold_router ────────────────────────────
  - id: saga_compensation_loop_rollback
    goal: "Send bulk API updates to 500 customers; if any step fails, roll back all completed updates."
    via: plan
    must_have: [saga_compensation, audit_log]
    forbidden: [calendar_lookup, calendar_write, design_brief_generation]

  - id: threshold_router_confidence
    goal: "Route a document through approve, manual-review, or reject based on an AI confidence score threshold."
    via: plan
    must_have: [threshold_router]
    forbidden: [calendar_lookup, calendar_write, design_brief_generation]
