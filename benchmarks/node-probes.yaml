  # в”Җв”Җ Cluster E: Full code-agent pipeline (3 edges) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Edges: plan_generationвҶ’test_runner (tested_with),
