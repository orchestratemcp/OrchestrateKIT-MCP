# OrchestrateKit MCP вҖ” Node probes (MAR-125 / TEST-01)
#
# Deterministic, single-capability assertions run through the FULL composeRoute
# (matcher + safety augmenter + ordering). No LLM, no human. These are FIXTURES
# that pin matcher/composer behaviour at the unit level вҖ” NOT logged sessions.
#
# Per probe:
#   goal       вҖ” a single-capability goal in plain language
#   must_have  вҖ” component ids that MUST appear in the composed route
#   forbidden  вҖ” component ids that MUST NOT appear (guards cross-domain bleed)
#   xfail      вҖ” (optional) known-failing probe documenting an open bug. Does not
#                fail the gate; if it starts PASSING the runner errors so the
#                marker (and the bug) can be closed out. `finding` = Linear id.
#
# Run:  pnpm probe            (exit 1 on any miss/leak)
# CI:   tests/graph/nodeProbes.test.ts runs the same probes under vitest.

probes:
  # в”Җв”Җ email / calendar domain в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: email_draft_basic
    goal: "Draft a reply email to a customer enquiry."
    must_have: [email_draft]
    forbidden: [design_brief_generation, research_synthesis, external_publish]

  - id: email_read_triage
    goal: "Read and triage my incoming emails."
    must_have: [email_read]
    forbidden: [design_brief_generation, external_publish]

  - id: calendar_lookup_availability
    goal: "Look up my calendar availability for next week."
    must_have: [calendar_lookup]
    forbidden: [external_publish, research_synthesis, design_brief_generation]

  # в”Җв”Җ research domain в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: research_synthesis_with_citations
    goal: "Synthesize a grounded summary from multiple research sources with inline citations."
    must_have: [research_synthesis, citation_checker]
    forbidden: [external_publish, design_brief_generation, crm_note_write]

  - id: source_retrieval_only
    goal: "Retrieve documents from multiple origins for a research task."
    must_have: [source_retrieval]
    forbidden: [external_publish, design_brief_generation]

  # в”Җв”Җ content / publishing domain в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: design_brief_generation
    goal: "Generate a creative design brief for a marketing campaign."
    must_have: [design_brief_generation]
    forbidden: [research_synthesis, external_publish, crm_note_write]

  - id: external_publish_safety_chain
    goal: "Publish approved marketing content to our social channels, with an audit trail, only after I approve it."
    must_have: [external_publish, human_approval_gate, audit_log]
    forbidden: [crm_note_write]

  # в”Җв”Җ data / ETL domain в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: etl_scrape_normalize_validate
    goal: "Build a pipeline that scrapes data, normalizes it, and validates the schema."
    must_have: [data_scraper, data_normalizer, schema_validation]
    forbidden: [external_publish, research_synthesis, design_brief_generation]

  - id: deduplication_only
    goal: "Deduplicate records in a dataset."
    must_have: [deduplication]
    forbidden: [external_publish, design_brief_generation, research_synthesis]

  # в”Җв”Җ code-agent domain в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: code_edit_and_test
    goal: "An agent that edits code in my repository and runs the test suite."
    must_have: [code_editing, test_runner]
    forbidden: [research_synthesis, external_publish, design_brief_generation]

  - id: codebase_scan_only
    goal: "Scan the codebase and summarize its structure."
    must_have: [codebase_scan]
    forbidden: [external_publish, research_synthesis, design_brief_generation]

  - id: pr_summary_only
    goal: "Summarize a pull request for reviewers."
    must_have: [pr_summary]
    forbidden: [research_synthesis, external_publish, design_brief_generation]

  # в”Җв”Җ crm / sales domain в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: crm_note_after_call
    goal: "Write a note to our CRM after a sales call."
    must_have: [crm_note_write]
    forbidden: [external_publish, design_brief_generation, research_synthesis]

  # MAR-140: a CRM goal that explicitly negates email ("No outbound emails")
  # must not leak email_* components. The email_calendar domain was kept alive
  # by a negated strong keyword inside suppressWeakOnlyDomain's hasStrong recheck.
  - id: crm_note_no_outbound_email
    goal: "Write a clean internal CRM note after a sales call and schedule a follow-up task. No outbound emails to customer."
    must_have: [crm_note_write]
    forbidden: [email_read, email_draft, optional_email_send, external_publish, research_synthesis]

  # в”Җв”Җ monitoring domain в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: page_monitor_alert
    goal: "Monitor a web page for changes and alert me when it changes."
    must_have: [page_monitor]
    forbidden: [external_publish, design_brief_generation, research_synthesis]

  # в”Җв”Җ generic orchestration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: intent_classifier_only
    goal: "Classify the intent of an incoming support message."
    must_have: [intent_classifier]
    forbidden: [external_publish, design_brief_generation, research_synthesis]

  # в”Җв”Җ MAR-131: "schedule"/"hourly" must not inject calendar_* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Weak timing tokens are infra signals, not calendar signals. A monitoring or
  # content goal with no email/calendar intent must not pull calendar components.
  - id: hourly_monitor_no_calendar
    goal: "Monitor a competitor's pricing page on an hourly schedule and alert me when the price changes."
    must_have: [page_monitor]
    forbidden: [calendar_lookup, calendar_write]

  - id: social_schedule_no_calendar
    goal: "Repurpose a blog post into social posts and schedule them across channels."
    must_have: [external_publish]
    forbidden: [calendar_lookup, calendar_write]

  # в”Җв”Җ MAR-130: email_calendar_assistant must not over-match other domains в”Җв”Җв”Җв”Җ
  # Run through plan_workflow (the playbook-routing path). A generic
  # trigger+approval+write shape must NOT be led by email_calendar_assistant when
  # the goal's primary domain is CRM / invoice / HR.
  - id: crm_lead_not_email_calendar
    goal: "When a new lead comes in, log a note to our CRM and draft a follow-up email for approval."
    via: plan
    must_have: [crm_note_write]
    forbidden: []
    forbidden_playbook: [email_calendar_assistant]

  - id: invoice_reminder_not_email_calendar
    goal: "Read incoming invoice emails, extract the totals, and send a reminder email when one is overdue."
    via: plan
    must_have: [email_read]
    forbidden: []
    forbidden_playbook: [email_calendar_assistant]

  - id: hr_onboarding_not_email_calendar
    goal: "Onboard a new hire: schedule their intro meetings and send a welcome email."
    via: plan
    must_have: [email_draft]
    forbidden: []
    forbidden_playbook: [email_calendar_assistant]

  # в”Җв”Җ MAR-132: "no human in the loop" with Slack output вҶ’ advisory gate в”Җв”Җв”Җв”Җв”Җв”Җ
  # The word "human" in an explicit opt-out used to fuzzy-match the gate into
  # a read-only monitor route. Safety gates come from the augmenter (real
  # external writes), never fuzzy token matching. "Slack" IS a real write so
  # slack_notification must appear and the gate becomes advisory (not required).
  - id: unattended_monitor_no_gate
    goal: "Monitor a competitor's pricing page on an hourly schedule and alert me on Slack when it changes. Runs unattended, no human in the loop."
    must_have: [page_monitor, slack_notification]
    forbidden: [calendar_lookup, calendar_write]

  # в”Җв”Җ T2 content gaps: trigger components в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: scheduled_trigger_nightly_etl
    goal: "Run a nightly data extraction job that scrapes the product catalogue and loads it into the warehouse."
    via: plan
    must_have: [scheduled_trigger, data_scraper]
    forbidden: [calendar_lookup, calendar_write, email_draft]

  - id: webhook_trigger_stripe_payment
    goal: "React to Stripe payment events via webhook: validate the payload, update CRM, and notify the sales team on Slack."
    via: plan
    must_have: [webhook_trigger, schema_validation]
    # MAR-145: "webhook" must select ONLY webhook_trigger вҖ” not the sibling
    # scheduled_trigger / github_trigger (the three shared the id-segment "trigger").
    forbidden: [calendar_lookup, calendar_write, scheduled_trigger, github_trigger]

  - id: review_draft_composer_content
    goal: "Draft a weekly market update report from research sources and stage it for editorial review before publishing."
    via: plan
    must_have: [review_draft_composer]
    forbidden: [calendar_lookup, calendar_write]

  - id: multi_variant_generator_ab
    goal: "Generate five A/B test variants of the product launch email subject line and body for the campaign."
    via: plan
    must_have: [multi_variant_generator]
    forbidden: [calendar_lookup, calendar_write]

  # в”Җв”Җ T3 integration components в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # MAR-145 (ChatGPT dogfood): "invoice" must NOT pull stripe_data_read вҖ” most
  # invoice workflows are ERP/AP/accounting, not Stripe.
  - id: pdf_extraction_invoice
    goal: "Extract line items and totals from uploaded PDF invoices and load the structured data into the accounting system."
    via: plan
    must_have: [pdf_extraction, data_normalizer]
    forbidden: [calendar_lookup, calendar_write, email_draft, stripe_data_read]

  - id: airtable_lookup_crm
    goal: "Look up customer records from the Airtable CRM base, normalise the fields, and generate a weekly summary report."
    via: plan
    must_have: [airtable_lookup]
    forbidden: [calendar_lookup, calendar_write]

  - id: stripe_data_read_churn
    goal: "Read subscription data from Stripe, identify customers who cancelled in the last 30 days, and produce a churn analysis report."
    via: plan
    must_have: [stripe_data_read, data_normalizer]
    forbidden: [calendar_lookup, calendar_write]

  # в”Җв”Җ T4 control-flow + trigger components в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: github_trigger_pr_review
    goal: "Trigger a code review workflow when a pull request is opened on GitHub вҖ” validate the payload, run tests, and notify the reviewer."
    via: plan
    must_have: [github_trigger, schema_validation]
    forbidden: [calendar_lookup, calendar_write]

  - id: loop_controller_batch
    goal: "Process each item in a backlog list by iterating through them one at a time and generating a summary for each."
    via: plan
    must_have: [loop_controller]
    forbidden: [calendar_lookup, calendar_write]

  - id: reviewer_notification_draft
    goal: "Generate a draft article from the content brief and send a review request to the editorial team before publishing."
    via: plan
    must_have: [reviewer_notification]
    forbidden: [calendar_lookup, calendar_write]

  # в”Җв”Җ MAR-128: playbook routing must COVER an explicit primary-domain match в”Җв”Җв”Җв”Җ
  # "send it to a reviewer to approve" matches reviewer_notification (output).
  # This goal overlaps content_approval_pipeline at precision 0.78 (recall 1.0),
  # so playbook-first routing used to LEAD with the playbook and DROP
  # reviewer_notification вҖ” the delivered design no longer notified a reviewer.
  # The coverage guard appends the matched primary-domain component to the
  # playbook route, so reviewer_notification appears whether or not it routes via
  # a playbook (the playbook lead is preserved вҖ” no forbidden_playbook here).
  - id: blog_reviewer_notify_keeps_reviewer_notification
    goal: "Write blog copy from the brief, send it to a reviewer to approve, and publish to the blog."
    via: plan
    must_have: [reviewer_notification]
    forbidden: []

  # в”Җв”Җ MAR-134: saga_compensation + threshold_router в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  - id: saga_compensation_loop_rollback
    goal: "Send bulk API updates to 500 customers; if any step fails, roll back all completed updates."
    via: plan
    must_have: [saga_compensation, audit_log]
    forbidden: [calendar_lookup, calendar_write, design_brief_generation]

  # MAR-145 (ChatGPT dogfood): the conjugation "rolls back" must reach
  # saga_compensation too вҖ” "rolls back everything if any step fails" missed it
  # and collapsed the flagship invoice/batch plan's whole safety chain.
  - id: saga_compensation_rolls_back_conjugation
    goal: "Process 100 invoices in parallel and rolls back everything if any step fails."
    via: plan
    must_have: [saga_compensation, audit_log]
    forbidden: [calendar_lookup, calendar_write, stripe_data_read]

  - id: threshold_router_confidence
    goal: "Route a document through approve, manual-review, or reject based on an AI confidence score threshold."
    via: plan
    must_have: [threshold_router]
    forbidden: [calendar_lookup, calendar_write, design_brief_generation]

  # в”Җв”Җ Dogfood Round 3 residuals (2026-06-18) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  # MAR-140: a code goal that explicitly forbids editing ("never edit code",
  # "read-only") must NOT yield code_editing. Most dangerous leak class вҖ”
  # proposing a write when the user forbade it. The trigger token is the bare
  # word "code", so this needs the explicit read-only constraint check, not the
  # negation heuristic (which keys off "edit").
  - id: readonly_pr_review_no_code_editing
    goal: "Review pull requests on GitHub for code quality and leave inline comments, but never edit code вҖ” this is a read-only reviewer."
    via: plan
    must_have: [pr_summary]
    forbidden: [code_editing]

  # MAR-145: the bare token "webhook" must select ONLY webhook_trigger, not the
  # sibling scheduled_trigger / github_trigger. Mirrors Dogfood Round 3 G2.
  - id: webhook_only_no_sibling_triggers
    goal: "When a Stripe webhook fires, validate the payload and update the customer LTV field in Airtable."
    via: plan
    must_have: [webhook_trigger]
    forbidden: [github_trigger, scheduled_trigger, calendar_lookup, calendar_write]

  # scheduled_trigger inversion: natural recurring-time phrasing ("every morning
  # at 8am") must reach scheduled_trigger вҖ” it was missed in G1 after MAR-140
  # removed "schedule" from the calendar hints. Also asserts the over-match fix:
  # no webhook/github trigger noise leaks into a purely scheduled goal.
  - id: scheduled_trigger_morning_report
    goal: "Every morning at 8am, pull yesterday's signups from the database, summarise them, and post the summary to Slack."
    via: plan
    must_have: [scheduled_trigger]
    forbidden: [webhook_trigger, github_trigger, calendar_lookup, calendar_write]

  # в”Җв”Җ MAR-140 round-3 residual: non-code negation (2026-06-19) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  # An explicit "do not publish externally" must drop external_publish, the same
  # way "never edit code" drops code_editing. Generalises the read-only
  # suppression to the publish capability. Goal stays on the composed path (a
  # social-variant goal, too low precision for the content playbook).
  - id: no_publish_drops_external_publish
    goal: "Generate three social media post variants from this blog and route them for human approval. Do not publish anything externally."
    must_have: [multi_variant_generator]
    forbidden: [external_publish]

  # An explicit "no mailbox polling" must drop email_read while keeping the rest
  # of the email domain (the goal still sends a digest, so email_draft stays).
  - id: no_mailbox_polling_drops_email_read
    goal: "Send a daily digest email to the team. No mailbox polling вҖ” you do not read any inbox."
    must_have: [email_draft]
    forbidden: [email_read]

  # OVER-SUPPRESSION GUARD: a bare "read-only" scopes to the DATA SOURCE, not the
  # whole workflow. It must NOT kill the wanted Slack alert. This pins the line
  # the negation suppression must never cross (the explicit boundary in MAR-140).
  - id: readonly_monitor_keeps_slack
    goal: "Monitor our pricing page read-only and send me a Slack alert when the price changes."
    must_have: [page_monitor, slack_notification]
    forbidden: [calendar_lookup, calendar_write]

  # MAR-161 (un-xfail'd; was the MAR-140 broader-negation residual): a "drafts
  # only" SOCIAL goal must not leak email_draft / optional_email_send. Root cause
  # was that the word "draft" established the email_calendar domain; it is now a
  # WEAK email_calendar trigger, dropped when a stronger primary domain (content)
  # is present and no strong email token exists. "drafts only" additionally drops
  # optional_email_send via the constraint engine.
  - id: drafts_only_social_no_email_components
    goal: "Generate three social post variants from this blog, drafts only, and send them for human approval."
    must_have: [multi_variant_generator]
    forbidden: [email_draft, optional_email_send]

  # MAR-161: the no-send constraint must fire even when the email domain is
  # LEGITIMATELY present вҖ” "draft a reply ... but do not send" keeps email_read +
  # email_draft (the user wants drafts) yet drops optional_email_send. This is the
  # case the weak-"draft" domain de-bias can't reach (there IS real email intent
  # here), so it pins the constraint engine specifically.
  - id: draft_replies_no_send
    goal: "Read my inbox and draft a reply to each email, but do not send anything вҖ” leave them as drafts for me to review."
    must_have: [email_read, email_draft]
    forbidden: [optional_email_send]

  # в”Җв”Җ loop / orchestration domain (MAR-167) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # An explicitly iterative goal must select loop_controller вҖ” the deterministic
  # trigger that makes plan_workflow surface the bounded dynamic_worker_loop
  # contract. Pins the "loop"/"iterate" hint so the loop guidance can't silently
  # stop firing.
  - id: iterative_loop_selects_loop_controller
    goal: "Trigger an agent on a webhook that loops: a coder writes code and an independent reviewer keeps iterating until the tests pass and it is approved."
    must_have: [loop_controller]
    forbidden: [email_draft, crm_note_write]

  # в”Җв”Җ MAR-207 TEST-02: Edge-coverage campaign в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # 21 probes cover 32 still-untested edges.
  # Phase 0 free wins (already exercised by existing probes above вҖ” now flipped
  # to tested:true in the edge YAML):
  #   github_triggerвҶ’schema_validation   вҶҗ probe: github_trigger_pr_review
  #   stripe_data_readвҶ’data_normalizer   вҶҗ probe: stripe_data_read_churn
  #   webhook_triggerвҶ’schema_validation  вҶҗ probe: webhook_trigger_stripe_payment
  #   research_synthesisвҠҳexternal_publishвҶҗ probe: research_synthesis_with_citations

  # в”Җв”Җ Cluster A: Support email triage via intent classifier (2 edges) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Edges: email_readвҶ’intent_classifier, intent_classifierвҶ’crm_note_write
  # Note: intent_classifierвҶ’source_retrieval has its own probe below (Cluster A2)
  # because source_retrieval does not fire in an email-triage goal context.
  - id: support_email_triage_classifier
    goal: "Read incoming support emails, classify each message by intent, and route high-priority issues to the CRM."
    via: plan
    must_have: [email_read, intent_classifier, crm_note_write]
    forbidden: [design_brief_generation, calendar_lookup, calendar_write]

  # в”Җв”Җ Cluster A2: Intent classifier вҶ’ source retrieval (1 edge, xfail) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Edge: intent_classifierвҶ’source_retrieval
  # xfail: "customer support query" + "knowledge base articles" routes to
  # threshold_router + design_brief_generation instead of source_retrieval.
  # Two routing failures: (a) "articles" triggers design_brief_generation content
  # creation path; (b) "classify" + "query" over-matches threshold_router.
  # The edge IS covered as a side-effect by probe/user_goal_intake_pipeline
  # (must_have includes both intent_classifier and source_retrieval in a research
  # context). This xfail documents the customer-support routing gap вҖ” file a
  # matcher issue when the customer-support context misrouting is addressed.
  - id: intent_classifier_to_source_retrieval
    goal: "Classify a customer support query by intent and retrieve relevant knowledge base articles to suggest an answer."
    via: plan
    must_have: [intent_classifier, source_retrieval]
    forbidden: [design_brief_generation]
    xfail: true
    finding: MAR-207

  # в”Җв”Җ Cluster B: user_goal_intake edges (2 edges) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # Edges: user_goal_intakeвҶ’intent_classifier, user_goal_intakeвҶ’source_retrieval
  # XPASS on first run: augmenter injects user_goal_intake because intent_classifier
  # declares requires:[user_goal_intake]. Both edges confirmed routed.
  - id: user_goal_intake_pipeline
    goal: "Accept an incoming research request from the user, classify its intent, and retrieve relevant source documents."
    via: plan
    must_have: [user_goal_intake, intent_classifier, source_retrieval]

