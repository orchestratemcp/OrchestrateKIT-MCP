# Cloudflare Worker config for the public OrchestrateKit MCP endpoint.
# Deploy: pnpm deploy:worker   (runs `pnpm gen:registry` first via the script)
# Local:  pnpm dev:worker      (wrangler dev on http://localhost:8787)
name = "orchestratekit-mcp"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Free Workers plan covers this (100k requests/day). No KV/D1/secrets needed —
# the registry + docs index are bundled into the build, read-only, no state.
